name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/release.keystore

      - name: Verify Keystore
        run: |
          keytool -list -keystore ${{ github.workspace }}/app/release.keystore -storepass ${{ secrets.KEYSTORE_PASS }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: ./gradlew assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/*.apk output/Waqar-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Waqar-Release
          path: output/Waqar-v1.0.apk
